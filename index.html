<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>GSNCO work status</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0F2A4A">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GSNCO work status">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.47.0/iconfont/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  :root{
    --bg:#EEF1F5; --card:#FFFFFF; --border:#DDE3EA; --border-strong:#B8C4D1;
    --text:#152033; --text-secondary:#5B6B82; --text-tertiary:#94A3B8;
    --navy:#0F2A4A; --navy-light:#1E3A5F;
    --accent:#0E7C8C; --accent-light:#E3F4F6; --accent-dark:#0A5E6B;
    --coral:#E8623D; --coral-light:#FCE6DE;
    --amber:#E8A23D; --amber-light:#FCEFDA;
    --violet:#7C5CBF; --violet-light:#EEE7F8;
    --docs:#9A6400; --docs-bg:#FCEFD4;
    --progress:#1D5FB0; --progress-bg:#E2EDFB;
    --filed:#107A4D; --filed-bg:#DDF3E8;
    --query:#B83D5C; --query-bg:#FBE5EB;
  }
  *{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;}
  body{background:var(--bg);color:var(--text);min-height:100vh;}
  .app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}
  .topbar{padding:22px 18px 18px;background:linear-gradient(135deg,var(--navy) 0%,var(--navy-light) 100%);position:sticky;top:0;z-index:10;box-shadow:0 4px 16px rgba(15,42,74,0.18);}
  .topbar h1{font-size:18.5px;font-weight:600;letter-spacing:-0.2px;color:#fff;}
  .topbar .sub{font-size:12.5px;color:rgba(255,255,255,0.68);margin-top:3px;}
  .sync-status{display:flex;align-items:center;gap:6px;font-size:11.5px;color:rgba(255,255,255,0.78);margin-top:10px;}
  .sync-dot{width:6px;height:6px;border-radius:50%;background:#3DDC97;box-shadow:0 0 0 3px rgba(61,220,151,0.25);}
  .sync-dot.error{background:#F2667D;box-shadow:0 0 0 3px rgba(242,102,125,0.25);}
  .summary-row{display:flex;flex-wrap:wrap;gap:6px;padding:16px 16px 4px;}
  .sum-chip{flex:1;min-width:60px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:7px 6px;text-align:center;cursor:pointer;transition:all .15s;}
  .sum-chip.active{border-color:var(--accent);background:var(--accent-light);box-shadow:0 1px 0 var(--accent) inset;}
  .sum-chip .n{font-size:17px;font-weight:700;line-height:1.1;color:var(--navy);}
  .sum-chip.active .n{color:var(--accent-dark);}
  .sum-chip .l{font-size:9.5px;color:var(--text-secondary);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500;}
  .controls{padding:12px 16px 8px;display:flex;gap:8px;}
  .search-box{flex:1;position:relative;}
  .search-box input{width:100%;height:40px;border:1px solid var(--border);border-radius:11px;padding:0 12px 0 36px;font-size:14px;background:var(--card);color:var(--text);}
  .search-box input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-light);}
  .search-box i{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:16px;color:var(--text-tertiary);}
  select.staff-filter{height:40px;border:1px solid var(--border);border-radius:11px;background:var(--card);color:var(--text);font-size:13px;padding:0 8px;max-width:112px;}
  .list{flex:1;padding:6px 16px 90px;display:flex;flex-direction:column;gap:9px;}
  .empty{text-align:center;padding:60px 20px;color:var(--text-tertiary);font-size:13.5px;}
  .work-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:13px 15px;box-shadow:0 1px 3px rgba(15,42,74,0.05);position:relative;overflow:hidden;}
  .work-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--stripe,var(--border-strong));}
  .work-card.s-docs::before{background:var(--docs);}
  .work-card.s-progress::before{background:var(--progress);}
  .work-card.s-filed::before{background:var(--filed);}
  .work-card.s-query::before{background:var(--query);}
  .work-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
  .work-name{font-size:14.5px;font-weight:600;line-height:1.3;color:var(--navy);}
  .work-meta{font-size:12px;color:var(--text-secondary);margin-top:3px;display:flex;gap:9px;flex-wrap:wrap;}
  .work-meta span{display:inline-flex;align-items:center;gap:3px;}
  .badge{font-size:10.5px;font-weight:600;padding:4px 9px;border-radius:7px;white-space:nowrap;flex-shrink:0;letter-spacing:0.1px;}
  .badge.docs{background:var(--docs-bg);color:var(--docs);}
  .badge.progress{background:var(--progress-bg);color:var(--progress);}
  .badge.filed{background:var(--filed-bg);color:var(--filed);}
  .badge.query{background:var(--query-bg);color:var(--query);}
  .work-remarks{font-size:12.5px;color:var(--text-secondary);margin-top:9px;padding-top:9px;border-top:1px dashed var(--border);font-style:italic;}
  .work-actions{display:flex;gap:6px;margin-top:11px;}
  .work-actions select{flex:1;height:33px;font-size:12px;border:1px solid var(--border);border-radius:9px;background:var(--bg);color:var(--text);padding:0 6px;}
  .work-actions button.edit-btn{height:33px;width:33px;border:1px solid var(--border);border-radius:9px;background:var(--bg);display:flex;align-items:center;justify-content:center;color:var(--accent-dark);flex-shrink:0;}
  .fab{position:fixed;bottom:20px;left:50%;transform:translateX(190px);width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,var(--accent) 0%,var(--accent-dark) 100%);color:#fff;border:none;display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 4px 14px rgba(14,124,140,0.4);cursor:pointer;}
  @media (max-width:520px){.fab{left:auto;right:20px;transform:none;}}
  .sheet-overlay{position:fixed;inset:0;background:rgba(15,32,51,0.45);display:flex;align-items:flex-end;justify-content:center;z-index:50;}
  .sheet{background:var(--card);width:100%;max-width:480px;border-radius:20px 20px 0 0;padding:18px 16px 24px;max-height:85vh;overflow-y:auto;}
  .sheet-handle{width:36px;height:4px;background:var(--border-strong);border-radius:2px;margin:0 auto 14px;}
  .sheet h2{font-size:16px;font-weight:600;margin-bottom:14px;color:var(--navy);}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12.5px;color:var(--text-secondary);margin-bottom:5px;font-weight:500;}
  .field input,.field select,.field textarea{width:100%;height:40px;border:1px solid var(--border);border-radius:10px;padding:0 12px;font-size:14px;background:var(--bg);color:var(--text);}
  .field textarea{height:64px;padding:8px 12px;resize:none;font-family:inherit;}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-light);}
  .sheet-actions{display:flex;gap:8px;margin-top:6px;}
  .sheet-actions button{flex:1;height:44px;border-radius:11px;font-size:14px;font-weight:600;border:none;}
  .btn-cancel{background:var(--bg);color:var(--text-secondary);border:1px solid var(--border) !important;}
  .btn-save{background:var(--accent);color:#fff;}
  .config-warning{margin:40px 16px;background:var(--query-bg);color:var(--query);font-size:13px;padding:16px;border-radius:10px;line-height:1.5;}
  .tab-bar{display:flex;gap:6px;padding:14px 16px 0;background:var(--bg);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
  .tab-bar::-webkit-scrollbar{display:none;}
  .tab-btn{flex:0 0 auto;height:40px;padding:0 13px;border-radius:11px 11px 0 0;border:none;background:transparent;color:var(--text-secondary);font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:6px;cursor:pointer;white-space:nowrap;}
  .tab-btn.active{background:var(--card);color:var(--navy);box-shadow:0 -2px 8px rgba(15,42,74,0.06);}
  .subtab-bar{display:flex;gap:6px;padding:8px 16px 6px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;background:var(--card);border-bottom:1px solid var(--border);}
  .subtab-bar::-webkit-scrollbar{display:none;}
  .subtab-btn{flex:0 0 auto;height:30px;padding:0 12px;border-radius:15px;border:1px solid var(--border);background:var(--bg);color:var(--text-secondary);font-size:11.5px;font-weight:600;white-space:nowrap;cursor:pointer;}
  .subtab-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
  .sum-chip.c-coral.active{border-color:var(--coral);background:var(--coral-light);}
  .sum-chip.c-coral.active .n{color:var(--coral);}
  .sum-chip.c-amber.active{border-color:var(--amber);background:var(--amber-light);}
  .sum-chip.c-amber.active .n{color:var(--amber);}
  .sum-chip.c-violet.active{border-color:var(--violet);background:var(--violet-light);}
  .sum-chip.c-violet.active .n{color:var(--violet);}
  .sum-chip.c-filed.active{border-color:var(--filed);background:var(--filed-bg);}
  .sum-chip.c-filed.active .n{color:var(--filed);}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <h1>GSNCO work status</h1>
    <div class="sub" id="header-sub">Connecting...</div>
    <div class="sync-status"><span class="sync-dot" id="sync-dot"></span><span id="sync-text">Connecting...</span></div>
  </div>
  <div id="install-banner" style="display:none;background:var(--accent-light);color:var(--accent-dark);font-size:12.5px;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;">
    <span>Install this app on your phone for quicker access</span>
    <button id="install-btn" style="background:var(--accent);color:#fff;border:none;border-radius:7px;padding:6px 12px;font-size:12px;font-weight:600;flex-shrink:0;">Install</button>
  </div>
  <div class="tab-bar" id="group-tab-bar"></div>
  <div class="subtab-bar" id="sub-tab-bar"></div>
  <div class="summary-row" id="summary-row"></div>
  <div class="controls">
    <div class="search-box">
      <i class="ti ti-search"></i>
      <input type="text" id="search-input" placeholder="Search client name">
    </div>
    <select class="staff-filter" id="staff-filter"><option value="">All staff</option></select>
  </div>
  <div class="list" id="list"></div>
  <button class="fab" id="add-btn" aria-label="Add new pending work"><i class="ti ti-plus"></i></button>
</div>

<script>
// ============================================================
// CONNECTION SETTINGS -- fill these in once your Supabase
// project is ready. Use the "anon" / "public" key here, NOT
// the service_role key (that one stays only in the sync script).
// ============================================================
const SUPABASE_URL = "https://dknvlqnuvjpfxkcvpyay.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_zP6oo3eaOqLavFolpKAjGA_jxKMVDJ4";
// ============================================================

const isConfigured = !SUPABASE_URL.includes("YOUR-PROJECT-REF");
let supabaseClient = null;
let DATA = [];
// Audit Intake is a separate screening checklist (client name + whether
// their audit data has been received yet) - a completely different shape
// from the Pending/Filed individual_returns rows above, stored in its own
// Supabase table. See serve.py's audit_intake sheet for the office side.
let AUDIT_DATA = [];

// ------------------------------------------------------------------
// Second sync expansion, 2026-07-21: Audits (Income Tax Audit + GSTR-9 +
// GSTR-9C), TDS Returns (Q1-Q4), ROC, and Special Works. Each mirrors the
// Audit Intake pattern above - its own Supabase table(s), loaded
// independently, rendered with its own small set of functions. Filing
// Particulars is NOT synced anywhere in this app (by explicit instruction) -
// only the working Pending/Filed-type lists ever reach here, and TDS's
// government portal login/password columns (which live only in the office
// tracker's Filing Particulars sheet) never leave the office at all.
// See serve.py's SUPABASE_SYNC_CONFIG for the office side of each of these.
// ------------------------------------------------------------------
let TAX_AUDITS_DATA = [];   // office tracker's "audits" (Income Tax Audit) sheet
let GST_DATA = [];          // GSTR-9 AND GSTR-9C rows together, told apart by .form
let TDS_DATA = [];          // all 4 quarters together, told apart by .quarter
let ROC_DATA = [];
let SPECIAL_WORKS_DATA = [];

let tdsQuarter = 'Q1';      // 'Q1'..'Q4' - which quarter a NEW TDS entry gets tagged with

// 2026-07-22 follow-up: counts + staff-wise breakdown. Tax Audits/GST Audits
// get a per-staff chip row (like Individuals always has); TDS/ROC/Special
// Works only need a plain pending-vs-filed COUNT, no staff breakdown - so
// they get a simpler two-chip summary instead. auditStaffFilter narrows the
// Audits/GST list by clicking a staff chip (mirrors activeFilter below);
// statusFilter narrows ROC/Special Works by clicking the Pending/Filed chip
// (TDS doesn't need this - its Pending/Filed states are already separate
// sub-tabs, so its count chips just jump between sub-tabs instead).
let auditStaffFilter = null;
let statusFilter = null;   // null | 'pending' | 'filed' - ROC/Special Works only

function byParticulars(a, b){
  return (a.particulars || '').trim().toLowerCase().localeCompare((b.particulars || '').trim().toLowerCase());
}

// Mirrors serve.py's is_audit_status_done(): exact-word "done"/"filed"
// match only, so in-progress notes like "not done yet" or "still wip" are
// never mistaken for complete - same false-positive guard as the office
// tracker uses for its own auto-move logic.
function isDoneWord(v){
  const s = (v || '').trim().toLowerCase();
  return s === 'done' || s === 'filed';
}

// ROC has no single boolean "filed" field (unlike TDS) and no free-text
// work-status word to check (unlike Special Works/Audits/GST) - its 11
// fields are all process-tracking columns. Per the user's explicit choice
// (2026-07-22), an ROC entry counts as Filed once EITHER the SRN number or
// the filing status date has been filled in (an SRN is only issued once a
// filing is actually accepted on the MCA portal, so either one is a real
// completion signal).
function rocIsFiled(d){
  return !!((d.filing_status_srn || '').trim() || (d.filing_status_date || '').trim());
}

// Special Works only has a free-text Work Status field - per the user's
// explicit choice (2026-07-22), reuses the SAME exact-word "done" check as
// Tax Audits/GSTR-9/GSTR-9C above, so "not done yet" is correctly never
// counted as done.
function specialIsDone(d){
  return isDoneWord(d.work_status);
}

// ------------------------------------------------------------------
// Navigation, 2026-07-22: rebuilt to mirror serve.py's own NAV_GROUPS
// structure exactly (same 5 top-level groups, same sub-tab labels/order),
// per explicit request - "I want the structure as reflected in database
// file except filing particulars even in mobile app also." Every group
// here corresponds 1:1 to a NAV_GROUPS entry in serve.py; every sub-tab
// here corresponds 1:1 to one of that group's tabs, with every
// "Filing Particulars"-type tab left out (never synced to this app - see
// SUPABASE_SYNC_CONFIG on the office side). "Tax Audits list" (the
// owner-only screening tab, formerly its own top-level tab here) now sits
// as the first sub-tab under Audits, matching the office tracker exactly.
// ------------------------------------------------------------------
const NAV_GROUPS = [
  { key: 'individuals', label: 'Individuals', icon: 'ti-clock', tabs: [
    { key: 'ind_pending', label: 'Pending' },
    { key: 'ind_filed', label: 'Filed' },
  ]},
  { key: 'audits', label: 'Audits', icon: 'ti-report', tabs: [
    { key: 'intake', label: 'Tax Audits list' },
    { key: 'ta_pending', label: 'Tax Audits - Pending' },
    { key: 'ta_itr_pending', label: 'Tax Audits - 3CD Filed, ITR Pending' },
    { key: 'ta_filed', label: 'Tax Audits - Filed' },
    { key: 'gstr9_pending', label: 'GSTR-9 - Pending' },
    { key: 'gstr9_filed', label: 'GSTR-9 - Filed' },
    { key: 'gstr9c_pending', label: 'GSTR-9C - Pending' },
    { key: 'gstr9c_filed', label: 'GSTR-9C - Filed' },
  ]},
  { key: 'tds', label: 'TDS Returns', icon: 'ti-receipt', tabs: [
    { key: 'q1_pending', label: 'Q1 - Pending' },
    { key: 'q1_filed', label: 'Q1 - Filed' },
    { key: 'q2_pending', label: 'Q2 - Pending' },
    { key: 'q2_filed', label: 'Q2 - Filed' },
    { key: 'q3_pending', label: 'Q3 - Pending' },
    { key: 'q3_filed', label: 'Q3 - Filed' },
    { key: 'q4_pending', label: 'Q4 - Pending' },
    { key: 'q4_filed', label: 'Q4 - Filed' },
  ]},
  { key: 'roc', label: 'ROC', icon: 'ti-building', tabs: [
    { key: 'roc', label: 'ROC' },
  ]},
  { key: 'special', label: 'Special Works', icon: 'ti-stars', tabs: [
    { key: 'special', label: 'Special Works' },
  ]},
];

let currentGroup = 'individuals';
let currentSubTab = 'ind_pending';
let activeFilter = null, searchTerm = "", staffFilter = "";

function currentGroupObj(){ return NAV_GROUPS.find(g => g.key === currentGroup); }

function renderTopTabs(){
  const bar = document.getElementById('group-tab-bar');
  bar.innerHTML = NAV_GROUPS.map(g => `
    <button class="tab-btn ${currentGroup===g.key?'active':''}" data-group="${g.key}">
      <i class="ti ${g.icon}" style="font-size:15px"></i> ${g.label}
    </button>`).join('');
  bar.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => selectGroup(btn.dataset.group));
  });
}

function renderSubTabs(){
  const g = currentGroupObj();
  const bar = document.getElementById('sub-tab-bar');
  if(g.tabs.length <= 1){
    bar.style.display = 'none';
    bar.innerHTML = '';
    return;
  }
  bar.style.display = 'flex';
  bar.innerHTML = g.tabs.map(t => `
    <button class="subtab-btn ${currentSubTab===t.key?'active':''}" data-sub="${t.key}">${t.label}</button>`).join('');
  bar.querySelectorAll('.subtab-btn').forEach(btn => {
    btn.addEventListener('click', () => selectSubTab(btn.dataset.sub));
  });
}

function resetFiltersForNav(){
  activeFilter = null; staffFilter = ""; searchTerm = "";
  auditStaffFilter = null; statusFilter = null;
  document.getElementById('search-input').value = "";
  const sel = document.getElementById('staff-filter');
  if(sel) sel.value = "";
}

function selectGroup(key){
  currentGroup = key;
  currentSubTab = currentGroupObj().tabs[0].key;
  resetFiltersForNav();
  document.getElementById('staff-filter').style.display = (currentGroup === 'individuals') ? '' : 'none';
  renderTopTabs();
  renderSubTabs();
  renderAll();
}

function selectSubTab(key){
  currentSubTab = key;
  resetFiltersForNav();
  renderSubTabs();
  renderAll();
}

function showConfigWarning(){
  document.getElementById('header-sub').textContent = "Not connected yet";
  document.getElementById('sync-text').textContent = "Not configured";
  document.getElementById('sync-dot').classList.add('error');
  document.getElementById('list').innerHTML = `<div class="config-warning">
    <strong>This app isn't connected to your Supabase project yet.</strong><br><br>
    Open this file and fill in <code>SUPABASE_URL</code> and <code>SUPABASE_ANON_KEY</code>
    near the top of the script with your real project details, then reload.
  </div>`;
  document.getElementById('add-btn').style.display = 'none';
}

async function loadData(){
  const { data, error } = await supabaseClient
    .from('individual_returns')
    .select('*');
  if(error){
    document.getElementById('sync-text').textContent = "Connection error";
    document.getElementById('sync-dot').classList.add('error');
    console.error(error);
    return;
  }
  // Sort case-insensitively (trim + lowercase) so this matches the office
  // tracker's own alphabetical sort exactly, rather than relying on
  // Supabase/Postgres's default text ordering which can differ on case.
  DATA = (data || []).slice().sort((a, b) =>
    (a.particulars || '').trim().toLowerCase().localeCompare((b.particulars || '').trim().toLowerCase())
  );
  document.getElementById('sync-dot').classList.remove('error');
  document.getElementById('sync-text').textContent = "Live — synced with office Excel";
  document.getElementById('header-sub').textContent = "Connected to your office data";
  renderAll();
}

async function loadAuditIntake(){
  const { data, error } = await supabaseClient
    .from('audit_intake')
    .select('*');
  if(error){ console.error(error); return; }
  // Once a client is marked "data received", the office tracker
  // automatically moves them into the main Audits sheet - so this
  // screening checklist should only keep showing the ones still awaited.
  AUDIT_DATA = (data || [])
    .filter(d => !d.data_received)
    .slice()
    .sort((a, b) => (a.particulars || '').trim().toLowerCase().localeCompare((b.particulars || '').trim().toLowerCase()));
  renderAll();
}

async function loadTaxAudits(){
  const { data, error } = await supabaseClient.from('tax_audits').select('*');
  if(error){ console.error(error); return; }
  TAX_AUDITS_DATA = (data || []).slice().sort(byParticulars);
  renderAll();
}

async function loadGstAudits(){
  const { data, error } = await supabaseClient.from('gst_audits').select('*');
  if(error){ console.error(error); return; }
  GST_DATA = (data || []).slice().sort(byParticulars);
  renderAll();
}

async function loadTdsReturns(){
  const { data, error } = await supabaseClient.from('tds_returns').select('*');
  if(error){ console.error(error); return; }
  TDS_DATA = (data || []).slice().sort(byParticulars);
  renderAll();
}

async function loadRoc(){
  const { data, error } = await supabaseClient.from('roc_filings').select('*');
  if(error){ console.error(error); return; }
  ROC_DATA = (data || []).slice().sort(byParticulars);
  renderAll();
}

async function loadSpecialWorks(){
  const { data, error } = await supabaseClient.from('special_works').select('*');
  if(error){ console.error(error); return; }
  SPECIAL_WORKS_DATA = (data || []).slice().sort(byParticulars);
  renderAll();
}

function normalizeStaffName(name){
  // Different entry points (this app, the office tracker, the old Excel
  // sync) can save the same staff member's name with different
  // capitalisation or stray spaces - e.g. "MOUNIKA" vs "Mounika ". Without
  // this, each variant gets counted as a separate person in the summary
  // boxes, the staff dropdown, and filtering. This only affects how names
  // are GROUPED/DISPLAYED here - it never rewrites what's actually stored
  // in Supabase.
  if(!name) return '';
  return name.trim().replace(/\s+/g, ' ').toLowerCase().replace(/\b\w/g, c => c.toUpperCase());
}

function renderSummary(){
  const tabData = DATA.filter(d => currentSubTab === 'ind_filed' ? d.filed : !d.filed);
  const withStaff = {};
  tabData.forEach(d => { const s = normalizeStaffName(d.done_by) || 'Unassigned'; withStaff[s] = (withStaff[s]||0)+1; });
  // Show every staff member with at least one item, not just the top 3 -
  // still sorted so the busiest staff appear first.
  const allStaff = Object.entries(withStaff).sort((a,b)=>b[1]-a[1]);
  const colorClasses = ['c-coral','c-amber','c-violet'];

  const row = document.getElementById('summary-row');
  row.innerHTML = `
    <div class="sum-chip ${activeFilter===null?'active':''}" data-staff="">
      <div class="n">${tabData.length}</div><div class="l">All</div>
    </div>
    ${allStaff.map(([staff,count],i) => `
      <div class="sum-chip ${colorClasses[i % colorClasses.length]} ${activeFilter===staff?'active':''}" data-staff="${staff}">
        <div class="n">${count}</div><div class="l">${staff}</div>
      </div>`).join('')}`;
  row.querySelectorAll('.sum-chip').forEach(chip => {
    chip.addEventListener('click', () => { activeFilter = chip.dataset.staff || null; renderAll(); });
  });
}

// Generic staff-wise breakdown chip row, used by Audits (Tax Audits track)
// and GST Audits (GSTR-9/GSTR-9C) - same "All" + one-chip-per-staff pattern
// as renderSummary() above, just parameterized so it works for either
// doneByKey ('audit_done_by' vs 'done_by') and filtered via a separate
// auditStaffFilter state (so it doesn't collide with Individuals' own
// activeFilter). Called with the already sub-tab-filtered item list (i.e.
// after narrowing to e.g. "Tax Audits - Pending" but before any staff/search
// filter), matching how renderSummary() computes its own chip counts.
function renderStaffWiseSummary(items, doneByKey){
  const withStaff = {};
  items.forEach(d => { const s = normalizeStaffName(d[doneByKey]) || 'Unassigned'; withStaff[s] = (withStaff[s]||0)+1; });
  const allStaff = Object.entries(withStaff).sort((a,b)=>b[1]-a[1]);
  const colorClasses = ['c-coral','c-amber','c-violet'];

  const row = document.getElementById('summary-row');
  row.innerHTML = `
    <div class="sum-chip ${auditStaffFilter===null?'active':''}" data-staff="">
      <div class="n">${items.length}</div><div class="l">All</div>
    </div>
    ${allStaff.map(([staff,count],i) => `
      <div class="sum-chip ${colorClasses[i % colorClasses.length]} ${auditStaffFilter===staff?'active':''}" data-staff="${staff}">
        <div class="n">${count}</div><div class="l">${staff}</div>
      </div>`).join('')}`;
  row.querySelectorAll('.sum-chip').forEach(chip => {
    chip.addEventListener('click', () => { auditStaffFilter = chip.dataset.staff || null; renderAll(); });
  });
}

// Generic plain two-chip count summary (Pending/Filed, or Pending/Done) -
// used by TDS Returns, ROC, and Special Works, which the user explicitly
// said do NOT need a staff-wise breakdown, just the two counts. `pendingActive`/
// `filedActive` control which chip is highlighted; `onPendingClick`/
// `onFiledClick` differ by caller - TDS jumps to the matching sub-tab (its
// Pending/Filed states are already separate sub-tabs), while ROC/Special
// Works toggle a client-side statusFilter (they have no sub-tab split).
function renderCountSummary(pendingLabel, pendingCount, pendingActive, onPendingClick, filedLabel, filedCount, filedActive, onFiledClick){
  const row = document.getElementById('summary-row');
  row.innerHTML = `
    <div class="sum-chip c-amber ${pendingActive?'active':''}" data-kind="pending">
      <div class="n">${pendingCount}</div><div class="l">${pendingLabel}</div>
    </div>
    <div class="sum-chip c-filed ${filedActive?'active':''}" data-kind="filed">
      <div class="n">${filedCount}</div><div class="l">${filedLabel}</div>
    </div>`;
  row.querySelector('[data-kind="pending"]').addEventListener('click', onPendingClick);
  row.querySelector('[data-kind="filed"]').addEventListener('click', onFiledClick);
}

function renderStaffOptions(){

// Audits tab: Income Tax Audit / GSTR-9 / GSTR-9C, picked via a
// sub-selector shown where the staff summary chips normally go. Income Tax
// Audit has 3 stages (mirrors the office tracker's 3-way Pending / 3CD
// Filed,ITR Pending / Filed split); GSTR-9 and GSTR-9C each have 2
// (Pending/Filed) - all computed client-side from the same raw fields the
// office tracker itself uses, not a separate synced "stage" value.
// ------------------------------------------------------------------

function taxAuditStage(d){
  const cd = isDoneWord(d.form_3cd_3cb), itr = isDoneWord(d.itr_filing_status);
  if(cd && itr) return {label:'Filed', cls:'filed'};
  if(cd) return {label:'3CD Filed, ITR Pending', cls:'progress'};
  return {label:'Pending', cls:'docs'};
}
function gstStage(d){
  return isDoneWord(d.work_status) ? {label:'Filed', cls:'filed'} : {label:'Pending', cls:'docs'};
}

// renderAuditsGroupList() dispatches on the current sub-tab within the
// Audits group, showing a genuinely SEPARATE list per Pending/Filed state
// (matching serve.py's own separate sheets - audits/audits_itr_pending/
// audits_filed, gstr9_pending/gstr9_filed, gstr9c_pending/gstr9c_filed) -
// each list computed client-side from the shared field values (same
// taxAuditStage()/gstStage() logic as before), not a separate synced
// "stage" column, but genuinely filtered into its own box per sub-tab
// rather than one combined list with a badge.
function renderAuditsGroupList(){
  const sub = currentSubTab;
  if(sub === 'intake'){ renderIntakeList(); return; }

  let items, doneByKey, editSub;
  if(sub === 'ta_pending' || sub === 'ta_itr_pending' || sub === 'ta_filed'){
    const wantCls = sub === 'ta_pending' ? 'docs' : (sub === 'ta_itr_pending' ? 'progress' : 'filed');
    items = TAX_AUDITS_DATA.filter(d => taxAuditStage(d).cls === wantCls);
    doneByKey = 'audit_done_by';
    editSub = 'itr';
  } else if(sub === 'gstr9_pending' || sub === 'gstr9_filed'){
    const wantFiled = sub === 'gstr9_filed';
    items = GST_DATA.filter(d => d.form === 'GSTR-9' && isDoneWord(d.work_status) === wantFiled);
    doneByKey = 'done_by';
    editSub = 'gstr9';
  } else {
    const wantFiled = sub === 'gstr9c_filed';
    items = GST_DATA.filter(d => d.form === 'GSTR-9C' && isDoneWord(d.work_status) === wantFiled);
    doneByKey = 'done_by';
    editSub = 'gstr9c';
  }

  // Staff-wise breakdown, computed from the sub-tab-filtered bucket (before
  // the staff/search filters below) - same convention renderSummary() uses
  // for Individuals.
  renderStaffWiseSummary(items, doneByKey);
  if(auditStaffFilter) items = items.filter(d => (normalizeStaffName(d[doneByKey]) || 'Unassigned') === auditStaffFilter);
  if(searchTerm) items = items.filter(d => (d.particulars||'').toLowerCase().includes(searchTerm.toLowerCase()));

  const list = document.getElementById('list');
  if(items.length === 0){
    list.innerHTML = `<div class="empty">No entries here yet — add one below.</div>`;
    return;
  }
  list.innerHTML = items.map(d => `
    <div class="work-card s-docs">
      <div class="work-top">
        <div>
          <div class="work-name">${d.particulars}</div>
          <div class="work-meta">
            <span><i class="ti ti-user" style="font-size:13px"></i>${normalizeStaffName(d[doneByKey])||'Unassigned'}</span>
            ${d.work_status ? `<span><i class="ti ti-progress" style="font-size:13px"></i>${d.work_status}</span>` : ''}
          </div>
        </div>
      </div>
      <div class="work-actions">
        <button class="edit-btn" style="width:100%;" aria-label="Edit" onclick="openAuditSheet('${d.id}','${editSub}')"><i class="ti ti-edit" style="font-size:15px"></i>&nbsp;Edit</button>
      </div>
    </div>`).join('');
}

function openAuditSheet(id, sub){
  const isNew = id === null;
  const table = sub === 'itr' ? 'tax_audits' : 'gst_audits';
  const title = sub === 'itr' ? 'Tax Audits' : (sub === 'gstr9' ? 'GSTR-9' : 'GSTR-9C');
  let item;
  if(sub === 'itr'){
    item = isNew ? {particulars:'',audit_done_by:'',work_status:'',report_typing:'',gst:'',form_3cd_3cb:'',itr_filing_status:'',dsc:'',other_remarks:''} : TAX_AUDITS_DATA.find(d=>d.id===id);
  } else {
    item = isNew ? {particulars:'',done_by:'',work_status:''} : GST_DATA.find(d=>d.id===id);
  }

  const extraFields = sub === 'itr' ? `
      <div class="field"><label>Audit report typing</label><input type="text" id="fa-report" value="${item.report_typing||''}"></div>
      <div class="field"><label>GST</label><input type="text" id="fa-gst" value="${item.gst||''}"></div>
      <div class="field"><label>3CB-3CD status</label><input type="text" id="fa-3cd" value="${item.form_3cd_3cb||''}"></div>
      <div class="field"><label>ITR filing status</label><input type="text" id="fa-itr" value="${item.itr_filing_status||''}"></div>
      <div class="field"><label>DSC</label><input type="text" id="fa-dsc" value="${item.dsc||''}"></div>
      <div class="field"><label>Other remarks</label><textarea id="fa-remarks">${item.other_remarks||''}</textarea></div>` : '';

  const overlay = document.createElement('div');
  overlay.className = 'sheet-overlay';
  overlay.innerHTML = `
    <div class="sheet">
      <div class="sheet-handle"></div>
      <h2>${isNew?'Add':'Edit'} ${title} entry</h2>
      <div class="field"><label>Particulars (client name)</label><input type="text" id="fa-particulars" value="${item.particulars||''}"></div>
      <div class="field"><label>${sub==='itr'?'Audit done by':'Done by'}</label><input type="text" id="fa-doneby" value="${(sub==='itr'?item.audit_done_by:item.done_by)||''}"></div>
      <div class="field"><label>Work status</label><input type="text" id="fa-workstatus" value="${item.work_status||''}"></div>
      ${extraFields}
      <div class="sheet-actions">
        <button class="btn-cancel" id="asheet-cancel">Cancel</button>
        <button class="btn-save" id="asheet-save">Save</button>
      </div>
      ${!isNew ? `<button id="asheet-delete" style="width:100%;height:40px;margin-top:10px;background:none;border:none;color:var(--query);font-size:13px;font-weight:500;">Delete this entry</button>` : ''}
    </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', e => { if(e.target === overlay) overlay.remove(); });
  document.getElementById('asheet-cancel').onclick = () => overlay.remove();

  const reload = () => sub === 'itr' ? loadTaxAudits() : loadGstAudits();

  if(!isNew){
    document.getElementById('asheet-delete').onclick = async () => {
      document.getElementById('sync-text').textContent = "Deleting...";
      const { error } = await supabaseClient.from(table).delete().eq('id', item.id);
      if(error){ console.error(error); document.getElementById('sync-text').textContent = "Delete failed — check connection"; return; }
      overlay.remove();
      await reload();
    };
  }

  document.getElementById('asheet-save').onclick = async () => {
    const name = document.getElementById('fa-particulars').value.trim();
    if(!name) return;
    const doneBy = document.getElementById('fa-doneby').value.trim() || null;
    const payload = {
      particulars: name,
      work_status: document.getElementById('fa-workstatus').value.trim() || null,
      last_updated_by: 'Mobile app',
    };
    if(sub === 'itr'){
      payload.audit_done_by = doneBy;
      payload.report_typing = document.getElementById('fa-report').value.trim() || null;
      payload.gst = document.getElementById('fa-gst').value.trim() || null;
      payload.form_3cd_3cb = document.getElementById('fa-3cd').value.trim() || null;
      payload.itr_filing_status = document.getElementById('fa-itr').value.trim() || null;
      payload.dsc = document.getElementById('fa-dsc').value.trim() || null;
      payload.other_remarks = document.getElementById('fa-remarks').value.trim() || null;
    } else {
      payload.done_by = doneBy;
      payload.form = title;
    }
    document.getElementById('sync-text').textContent = "Saving...";
    let error;
    if(isNew){
      payload.excel_row_id = `app-${Date.now()}`;
      ({ error } = await supabaseClient.from(table).insert(payload));
    } else {
      ({ error } = await supabaseClient.from(table).update(payload).eq('id', item.id));
    }
    if(error){ console.error(error); document.getElementById('sync-text').textContent = "Save failed — check connection"; return; }
    overlay.remove();
    await reload();
  };
}

// ------------------------------------------------------------------
// TDS Returns tab: quarter + Pending/Filed picked via the sub-tab bar (one
// of Q1-Q4 x Pending/Filed, 8 sub-tabs total, matching serve.py's own 8
// tds_qN_pending/tds_qN_filed sheets exactly) - each a genuinely separate
// box, not one combined list with a badge.
// ------------------------------------------------------------------

function renderTdsGroupList(){
  const m = currentSubTab.match(/^q(\d)_(pending|filed)$/);
  const quarter = 'Q' + m[1];
  const wantFiled = m[2] === 'filed';

  // Plain pending/filed COUNT for this quarter (no staff breakdown, per the
  // user's explicit choice) - the two chips also double as quick nav
  // between this quarter's Pending/Filed sub-tabs, since those already
  // exist as separate sub-tabs rather than a client-side filter.
  const quarterItems = TDS_DATA.filter(d => d.quarter === quarter);
  const pendingCount = quarterItems.filter(d => !d.filed).length;
  const filedCount = quarterItems.filter(d => !!d.filed).length;
  renderCountSummary(
    'Pending', pendingCount, !wantFiled, () => selectSubTab(`q${m[1]}_pending`),
    'Filed', filedCount, wantFiled, () => selectSubTab(`q${m[1]}_filed`)
  );

  let items = quarterItems.filter(d => !!d.filed === wantFiled);
  if(searchTerm) items = items.filter(d => (d.particulars||'').toLowerCase().includes(searchTerm.toLowerCase()));

  const list = document.getElementById('list');
  if(items.length === 0){
    list.innerHTML = `<div class="empty">No ${quarter} ${wantFiled ? 'filed' : 'pending'} entries yet.</div>`;
    return;
  }
  list.innerHTML = items.map(d => `
    <div class="work-card ${d.filed?'s-filed':'s-docs'}">
      <div class="work-top">
        <div>
          <div class="work-name">${d.particulars}</div>
          <div class="work-meta">
            <span><i class="ti ti-user" style="font-size:13px"></i>${normalizeStaffName(d.done_by)||'Unassigned'}</span>
            ${d.form_type ? `<span><i class="ti ti-file-text" style="font-size:13px"></i>${d.form_type}</span>` : ''}
            ${d.work_status ? `<span><i class="ti ti-progress" style="font-size:13px"></i>${d.work_status}</span>` : ''}
          </div>
        </div>
        <span class="badge ${d.filed?'filed':'docs'}">${d.filed?'Filed':'Pending'}</span>
      </div>
      <div class="work-actions">
        <button class="work-actions-toggle" onclick="quickTdsFiledToggle('${d.id}', ${!d.filed})" style="flex:1;height:33px;font-size:12px;border:1px solid var(--border);border-radius:9px;background:${d.filed ? 'var(--bg)' : 'var(--filed-bg)'};color:${d.filed ? 'var(--text-secondary)' : 'var(--filed)'};font-weight:600;">
          ${d.filed ? 'Mark as pending' : 'Mark as filed'}
        </button>
        <button class="edit-btn" aria-label="Edit" onclick="openTdsSheet('${d.id}')"><i class="ti ti-edit" style="font-size:15px"></i></button>
      </div>
    </div>`).join('');
}

async function quickTdsFiledToggle(id, newVal){

  loadRoc();
  loadSpecialWorks();
  subscribeToLiveUpdates();
} else {
  showConfigWarning();
}

// ============================================================
// PWA install support
// ============================================================
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(err => console.log('Service worker registration failed:', err));
}

let deferredInstallPrompt = null;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredInstallPrompt = e;
  document.getElementById('install-banner').style.display = 'flex';
});

document.getElementById('install-btn').addEventListener('click', async () => {
  if(!deferredInstallPrompt) return;
  deferredInstallPrompt.prompt();
  const { outcome } = await deferredInstallPrompt.userChoice;
  if(outcome === 'accepted'){
    document.getElementById('install-banner').style.display = 'none';
  }
  deferredInstallPrompt = null;
});

window.addEventListener('appinstalled', () => {
  document.getElementById('install-banner').style.display = 'none';
});
</script>
</body>
</html>
